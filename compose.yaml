services:

  # Postgres-----------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: inventory_pg_db
    env_file: [".env"]
    ports: ["5434:5432"]
    networks: ["inventory_network"]
    volumes: ["inventory_pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB-----------------------------------------------------------
  mongodb:
    image: mongo:8
    container_name: inventory_mongodb
    env_file: [".env"]
    ports: ["27017:27017"]
    networks: ["inventory_network"]
    volumes: ["inventory_mongodb_data:/data/db"]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis-----------------------------------------------------------
  redis:
    image: redis:7
    container_name: inventory_redis
    ports: ['6379:6379']
    networks: ['inventory_network']
    # volumes: ["inventory_redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper-----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: inventory_zookeeper
    env_file: [".env"]
    ports: ["2181:2181"]
    networks: ["inventory_network"]
    # volumes:
    #   - inventory_zk_data:/var/lib/zookeeper/data
    #   - inventory_zk_log:/var/lib/zookeeper/log
    healthcheck:
      # Note: If 'nc' is missing in this image, use: ["CMD", "bash", "-c", "echo stat | nc localhost 2181"]
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka-----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: inventory_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    env_file: [".env"]
    ports: ["9092:9092", "29092:29092"] # Host and internal access
    networks: ["inventory_network"]
    # volumes: ["inventory_kafka_data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 25s
      timeout: 15s
      retries: 10

  # Kafka UI-----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: inventory_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports: ["8080:8080"]
    networks: ["inventory_network"]
    env_file: [".env"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      # Pointing UI to the internal network name above
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

networks:
  inventory_network:
    driver: bridge

volumes:
  inventory_pg_data:
  inventory_mongodb_data:
  # inventory_redis_data:
  # inventory_zk_data:
  # inventory_zk_log:
  # inventory_kafka_data:
