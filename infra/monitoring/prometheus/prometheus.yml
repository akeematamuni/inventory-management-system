global:
  scrape_interval: 300s
  evaluation_interval: 300s

scrape_configs:
  - job_name: 'inventory_api'
    # Remember global prefix
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
    relabel_configs:
      - target_label: application
        # replacement: 'ims_api'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['inventory_loki:3100']
